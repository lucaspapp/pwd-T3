<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!--meta name="viewport" content="width=device-width, initial-scale=0.5"-->
    <title>Ingreso de Usuarios</title>
    <link href="style.css" rel="stylesheet">
</head>
<body>

    <div class="container">
        <h2>Ingreso Usuarios</h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Correo Electrónico:</label>
                <input type="email" id="email" name="email" required>
                <div id="emailError" class="error"></div>
            
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" required>
                <div id="passwordError" class="error"></div>
            </div>
            
            <div class="form-group">
                <input type="submit" value="Ingresar">
            </div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault(); // Evitar el envío del formulario

            // Obtener valores de los campos
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            
            // Inicializar errores
            let hasErrors = false;

            // Validar Correo Electrónico
            if (email.trim() === '') {
                document.getElementById('emailError').textContent = 'El correo electrónico es obligatorio.';
                hasErrors = true;
            } else if (!/\S+@\S+\.\S+/.test(email)) {
                document.getElementById('emailError').textContent = 'El correo electrónico no es válido.';
                hasErrors = true;
            } else {
                document.getElementById('emailError').textContent = '';
            }

            // Validar Contraseña
            if (password.trim() === '') {
                document.getElementById('passwordError').textContent = 'La contraseña es obligatoria.';
                hasErrors = true;
            } else {
                document.getElementById('passwordError').textContent = '';
            }

                        // Si no hay errores, enviar el formulario
            if (!hasErrors) {
                enviarDatosAlServidor({ email, password });
                //alert('email:'+email+password+username+phone+school)
                // Aquí es donde normalmente se enviaría el formulario a un servidor
                // Ejemplo: this.submit();
            }
        });

        function enviarDatosAlServidor(datos) {
            fetch('procesar_login.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(datos),
            })
            .then(response => response.json())
            .then(data => {
                
                if (data.success) {
                    //alert('Login exitoso: ' + data.message);
                    
                    poner_username(data.usuario,data.roles);
                    poner_p40();
                    
                    if(data.roles=='administrador'){
                      poner_opcion_cms();
                      
                    }

                } else {
                    alert('EEError: ' + data.message);
                }
            })
            .catch(error => {
                alert('ERRor:'+ error);
            });
        }

    </script>
    <!---?php  poner_menu("cms",$_SESSION['roles']);?--->
</body>
</html>
